name: CI/CD

on:
  push:
    branches:
      - main
      - cleanup

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # Deployment job
  deploy:
    name: ⚙️ Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  slack-notifications:
    name: Slack Notification
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [build, deploy]
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: github-notifications
          SLACK_MESSAGE_TYPE: ${{ needs.deploy.result == 'success' && 'success' || 'error' }}
          SLACK_FOOTER: GitHub Actions
          SLACK_COLOR: ${{ needs.deploy.result }}
          SLACK_TITLE: GitHub Actions - developers
          SLACK_ICON_EMOJI: ':github'
          SLACK_ICON: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
          SLACK_USERNAME: github
          SLACK_MESSAGE: |
            Status: ${{ needs.deploy.result }}
            Repository: <${{ github.event.repository.html_url }}|${{ github.event.repository.name }}>
            Commit: <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>
            Committer Email: ${{ github.event.head_commit.author.email }}
            Branch: `${{ github.ref }}`
